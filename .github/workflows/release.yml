name: Test and Release

on:
  push:
    branches:
      - main

jobs:
  tests:
    strategy:
      matrix:
        node:
          - "22"
          - "24"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm coverage
      - name: Run type checking (src + tests)
        run: pnpm typecheck
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check linting
        run: pnpm lint
  version_match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version matching
        run: bin/check_version_change
  release:
    needs: [tests, lint, version_match]
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version tag
      id-token: write # OIDC for npm trusted publishing + provenance

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build js
        run: pnpm build
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest
      - name: Create tag and push it
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v$VERSION"
          git push --tags
      - name: Publish to npm (Trusted Publisher / OIDC)
        run: npm publish --access public --provenance
