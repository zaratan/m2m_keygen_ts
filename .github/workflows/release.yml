name: Test and Release

on:
  push:
    branches:
      - main

jobs:
  tests:
    strategy:
      matrix:
        node:
          - "22"
          - "24"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Run type checking (Typescript)
        run: pnpm exec tsc --noEmit
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check linting
        run: pnpm lint
  version_match:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version matching
        run: bin/check_version_change
  release:
    needs: [tests, lint, version_match]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build js
        run: pnpm exec tsc
      - name: Create tag and push it
        run: git tag "v`cat package.json | grep "version" | grep -E -o "[0-9]+\.[0-9]+\.[0-9]+"`" && git push --tags
      - uses: JS-DevTools/npm-publish@v3
        with:
          token: ${{ secrets.NPM_TOKEN }}
          access: public
